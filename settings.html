<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flowork OS — Settings</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0e1a;
            --bg2: #0d1117;
            --border: rgba(0,240,255,0.08);
            --text: #c8d6e5;
            --text2: #8a9aaa;
            --text3: #3a4d6a;
            --accent: #00f0ff;
            --pink: #ff0066;
            --green: #06d6a0;
            --yellow: #ffd166;
            --purple: #8b5cf6;
        }
        body {
            font-family: 'Inter','Segoe UI',sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255,0,102,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,0,102,0.02);
            flex-shrink: 0;
        }
        .header-title {
            font-weight: 700;
            font-size: 15px;
            font-family: 'Orbitron','Inter',sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(135deg,#ff0066,#ffd166);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions { display:flex; gap:10px; }
        .btn {
            font-size: 11px;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid;
            transition: all 0.2s;
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-save {
            background: linear-gradient(135deg,rgba(6,214,160,0.2),rgba(6,214,160,0.05));
            color: var(--green);
            border-color: rgba(6,214,160,0.3);
        }
        .btn-reset {
            background: rgba(255,0,102,0.08);
            color: var(--pink);
            border-color: rgba(255,0,102,0.2);
        }
        .main { display:flex; flex:1; overflow:hidden; }
        .sidebar {
            width: 190px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 10px 0;
            flex-shrink: 0;
        }
        .nav-item {
            padding: 9px 18px;
            font-size: 11px;
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .nav-item:hover { background:rgba(255,255,255,0.02); }
        .nav-item.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(0,240,255,0.03);
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .group {
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .group-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,240,255,0.015);
            border-top-left-radius: 9px;
            border-top-right-radius: 9px;
        }
        .group-body { padding: 14px 16px; }
        .field { margin-bottom: 12px; }
        .field:last-child { margin-bottom: 0; }
        .field-top {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }
        .field-label {
            font-size: 11px;
            color: var(--text);
            font-weight: 600;
        }
        /* Tooltip ? icon */
        .tip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: rgba(0,240,255,0.1);
            color: var(--accent);
            font-size: 9px;
            font-weight: 700;
            cursor: help;
            position: relative;
            flex-shrink: 0;
            border: 1px solid rgba(0,240,255,0.2);
        }
        .tip:hover { background: rgba(0,240,255,0.2); }
        .tip .tip-text {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: -10px;
            width: 260px;
            padding: 10px 12px;
            background: rgba(13,17,23,0.97);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 8px;
            font-size: 10.5px;
            font-weight: 400;
            color: var(--text);
            line-height: 1.6;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            pointer-events: none;
            white-space: normal;
        }
        .tip .tip-text::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 14px;
            border: 5px solid transparent;
            border-bottom-color: rgba(0,240,255,0.15);
        }
        .tip:hover .tip-text { display: block; }
        .tip-warn {
            display: block;
            margin-top: 6px;
            padding: 4px 6px;
            background: rgba(255,209,102,0.08);
            border-radius: 4px;
            color: var(--yellow);
            font-size: 9.5px;
        }
        .field-input {
            width: 100%;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'JetBrains Mono',monospace;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field-input:focus { border-color: rgba(0,240,255,0.3); }
        select.field-input { cursor:pointer; }
        select.field-input option { background:#0a0e1a; color:var(--text); }
        textarea.field-input { resize:vertical; min-height:60px; }
        .toggle-wrap { display:flex; align-items:center; gap:10px; }
        .toggle {
            width: 36px; height: 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 9px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle.on { background: rgba(6,214,160,0.4); }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle.on::after { transform: translateX(18px); }
        .env-status {
            margin-top: 20px;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .env-label { font-size:10px; color:var(--text3); letter-spacing:1px; margin-bottom:6px; }
        .env-value { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
        .toast {
            position:fixed; bottom:20px; right:20px;
            padding:10px 20px; border-radius:8px;
            font-size:12px; font-weight:700;
            display:none; z-index:999;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .divider { height:1px; background:var(--border); margin:10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚙️ ENGINE SETTINGS</div>
        <div class="header-actions">
            <button class="btn btn-save" id="btn-save">💾 SAVE ALL</button>
            <button class="btn btn-reset" id="btn-reset">🔄 RESET DEFAULT</button>
        </div>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar"></div>
        <div class="content" id="content"></div>
    </div>
    <div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';

    var STORAGE_KEY = 'flowork_settings';

    var GROUPS = [
        {
            id:'ai', label:'🤖 AI Provider', color:'#00f0ff',
            fields:[
                {key:'FLOWORK_MODE',label:'Engine Mode',type:'select',options:['DEV','PUBLISH'],
                    tip:'Controls whether the AI can modify Flowork system files.\n\nDEV = Full filesystem access for development. AI can create, edit, and delete files freely.\n\nPUBLISH = Sandbox mode. AI is locked down and can only run pre-deployed apps.',
                    warn:'DEV grants full filesystem access. Use PUBLISH for production.'
                },
                {key:'FLOWORK_AI_PROVIDER',label:'AI Provider',type:'select',options:['gemini','openai','anthropic','xai','deepseek','groq','mistral','together','fireworks','cohere','ollama'],
                    tip:'Primary LLM provider used for ALL AI features — App Builder, Browser Automation, Chat, and Node Builder.\n\n• Gemini = Google AI (free tier available)\n• OpenAI = GPT-4o family\n• Anthropic = Claude family\n• Groq = Ultra-fast inference\n• Ollama = Run locally on your PC (free, requires GPU)',
                    warn:'Ollama is free but requires local GPU. Cloud providers charge per token.'
                },
                {key:'FLOWORK_AI_MODEL',label:'AI Model',type:'combo',options:['gemini-2.5-flash','gemini-2.5-pro','gemini-2.0-flash','gpt-5.4','gpt-4o','gpt-4o-mini','claude-opus-4-20260217','claude-sonnet-4-20260217','claude-haiku-3-5-20241022','grok-4.20','deepseek-chat'],placeholder:'gemini-2.5-flash',
                    tip:'Specific model name from your provider.\n\nExamples:\n• Gemini: gemini-2.5-flash, gemini-2.5-pro\n• OpenAI: gpt-4o, gpt-4o-mini\n• Anthropic: claude-3-haiku, claude-sonnet-4\n• Ollama: llama3.3, codellama\n\nLarger models = smarter but slower & more expensive.',
                    warn:'Wrong model name = API error. Verify the model exists on your provider.'
                },
                {key:'FLOWORK_AI_KEY',label:'API Key',type:'password',placeholder:'Your API key...',sensitive:true,
                    tip:'Authentication key from your AI provider.\n\nGet yours from:\n• Gemini: aistudio.google.com\n• OpenAI: platform.openai.com/api-keys\n• Anthropic: console.anthropic.com\n• Groq: console.groq.com\n• Ollama: leave empty (runs locally)',
                    warn:'🔒 SECRET — never share this key. It provides access to paid AI services.'
                },
            ]
        },
        {
            id:'backup', label:'🔄 Failover', color:'#ffd166',
            fields:[
                {key:'FLOWORK_BACKUP_PROVIDER_1',label:'Backup 1 Provider',type:'select',options:['','openai','anthropic','gemini','groq'],
                    tip:'First fallback provider. If the main AI provider fails (rate limit, downtime, error), Flowork automatically switches to this backup.\n\nChoose a different provider than your main one for best redundancy.',
                    warn:'Without a backup, AI stops completely when the main provider is down.'
                },
                {key:'FLOWORK_BACKUP_MODEL_1',label:'Backup 1 Model',type:'combo',options:['gemini-2.5-flash','gpt-4o-mini','claude-haiku-3-5-20241022'],placeholder:'gpt-4o-mini',
                    tip:'Model name for Backup 1. Use a cheaper model (gpt-4o-mini, claude-3-haiku) to keep failover costs low.'
                },
                {key:'FLOWORK_BACKUP_KEY_1',label:'Backup 1 Key',type:'password',placeholder:'API key...',sensitive:true,
                    tip:'API Key for the Backup 1 provider. Must match the provider selected above.'
                },
                {key:'_d1',type:'divider'},
                {key:'FLOWORK_BACKUP_PROVIDER_2',label:'Backup 2 Provider',type:'select',options:['','openai','anthropic','gemini','groq'],
                    tip:'Second fallback. Used only if BOTH main and Backup 1 fail. This is your last safety net.'
                },
                {key:'FLOWORK_BACKUP_MODEL_2',label:'Backup 2 Model',type:'combo',options:['gemini-2.5-flash','gpt-4o-mini','claude-haiku-3-5-20241022'],placeholder:'claude-3-haiku-20240307',
                    tip:'Model name for Backup 2 provider.'
                },
                {key:'FLOWORK_BACKUP_KEY_2',label:'Backup 2 Key',type:'password',placeholder:'API key...',sensitive:true,
                    tip:'API Key for the Backup 2 provider.'
                },
            ]
        },
        {
            id:'whatsapp', label:'📱 WhatsApp', color:'#25D366',
            fields:[
                {key:'FLOWORK_WHATSAPP_ENABLED',label:'Enable WhatsApp',type:'toggle',
                    tip:'Activate the WhatsApp Business channel. When ON, Flowork registers a WhatsApp adapter and starts receiving/replying to messages automatically via AI.',
                    warn:'When ON, AI will auto-reply to WhatsApp messages. Make sure credentials are correct.'
                },
                {key:'FLOWORK_WHATSAPP_PHONE_ID',label:'Phone Number ID',type:'text',placeholder:'From Facebook Developers',
                    tip:'WhatsApp Business Phone Number ID.\n\nGet it from: developers.facebook.com → Your App → WhatsApp → Getting Started → Phone Number ID.\n\nLooks like a long number: "123456789012345".'
                },
                {key:'FLOWORK_WHATSAPP_TOKEN',label:'Access Token',type:'password',placeholder:'WhatsApp token...',sensitive:true,
                    tip:'Permanent Access Token from Facebook Developers.\n\nTemporary tokens expire in 24h. For a permanent token, create a System User in Business Settings → System Users → Generate Token.'
                },
                {key:'FLOWORK_WHATSAPP_VERIFY_TOKEN',label:'Verify Token',type:'text',placeholder:'my_verify_token',
                    tip:'Webhook verification token. You define this string yourself, then enter the same value in Facebook Developers → Webhooks → Verify Token.\n\nUsed when Facebook verifies your webhook endpoint. Can be any string you choose.'
                },
            ]
        },
        {
            id:'telegram', label:'✈️ Telegram', color:'#0088cc',
            fields:[
                {key:'FLOWORK_TELEGRAM_ENABLED',label:'Enable Telegram',type:'toggle',
                    tip:'Activate the Telegram Bot channel. When ON, Flowork registers a Telegram adapter and the bot starts responding to messages via AI.',
                    warn:'When ON, your Telegram bot will auto-respond to all messages.'
                },
                {key:'FLOWORK_TELEGRAM_BOT_TOKEN',label:'Bot Token',type:'password',placeholder:'From @BotFather',sensitive:true,
                    tip:'Bot token from @BotFather on Telegram.\n\nSteps:\n1. Open Telegram, search @BotFather\n2. Send /newbot\n3. Follow instructions (name + username)\n4. Copy the token\n\nFormat: "123456:ABC-DEF1234ghIkl-zyx57W2v"'
                },
                {key:'FLOWORK_TELEGRAM_WEBHOOK_URL',label:'Webhook URL',type:'text',placeholder:'https://your-domain.com/webhook/telegram',
                    tip:'Public HTTPS URL where Telegram sends updates. Must be accessible from the internet.\n\nIf left empty, Flowork will attempt to set it automatically when a tunnel (ngrok) is active.'
                },
            ]
        },
        {
            id:'discord', label:'🎮 Discord', color:'#5865F2',
            fields:[
                {key:'FLOWORK_DISCORD_ENABLED',label:'Enable Discord',type:'toggle',
                    tip:'Activate the Discord Bot channel. Discord requires a relay server (Node.js) for real-time WebSocket connections.\n\nFlowork registers the configuration, but you need a separate relay to bridge messages.',
                    warn:'Relay mode — requires a separate Node.js server for real-time connection.'
                },
                {key:'FLOWORK_DISCORD_BOT_TOKEN',label:'Bot Token',type:'password',placeholder:'Discord bot token...',sensitive:true,
                    tip:'Bot token from Discord Developer Portal.\n\nSteps:\n1. Go to discord.com/developers\n2. Create/select application\n3. Go to Bot section\n4. Click "Copy Token"\n\nAlso enable Privileged Gateway Intents (Message Content, Server Members).'
                },
                {key:'FLOWORK_DISCORD_APP_ID',label:'Application ID',type:'text',placeholder:'Discord Application ID',
                    tip:'Application ID from Discord Developer Portal → General Information → Application ID.\n\nUsed for registering slash commands and handling interactions.'
                },
            ]
        },
        {
            id:'slack', label:'💼 Slack', color:'#4A154B',
            fields:[
                {key:'FLOWORK_SLACK_ENABLED',label:'Enable Slack',type:'toggle',
                    tip:'Activate the Slack channel. When ON, Flowork can send and receive messages in your Slack workspace via the Web API.',
                    warn:'When ON, AI can post to Slack channels. Make sure the bot is invited to target channels.'
                },
                {key:'FLOWORK_SLACK_BOT_TOKEN',label:'Bot Token',type:'password',placeholder:'xoxb-...',sensitive:true,
                    tip:'Bot User OAuth Token from api.slack.com → Your App → OAuth & Permissions.\n\nStarts with "xoxb-". Required scopes: chat:write, channels:read, im:read.'
                },
                {key:'FLOWORK_SLACK_SIGNING_SECRET',label:'Signing Secret',type:'password',placeholder:'Slack signing secret',sensitive:true,
                    tip:'Signing Secret for verifying incoming requests from Slack.\n\nGet it from: api.slack.com → Your App → Basic Information → App Credentials → Signing Secret.\n\nEnsures requests are genuinely from Slack, not spoofed.'
                },
            ]
        },
        {
            id:'email', label:'📧 Email', color:'#ea4335',
            fields:[
                {key:'FLOWORK_EMAIL_ENABLED',label:'Enable Email',type:'toggle',
                    tip:'Enable email sending via SMTP. When ON, the AI can send emails (notifications, reports, alerts).',
                    warn:'When ON, AI can send emails on your behalf. Use carefully in DEV mode.'
                },
                {key:'FLOWORK_EMAIL_HOST',label:'SMTP Host',type:'text',placeholder:'smtp.gmail.com',
                    tip:'SMTP server address.\n\n• Gmail: smtp.gmail.com\n• Outlook: smtp-mail.outlook.com\n• Yahoo: smtp.mail.yahoo.com\n• Custom: ask your email admin'
                },
                {key:'FLOWORK_EMAIL_PORT',label:'SMTP Port',type:'number',placeholder:'587',
                    tip:'SMTP port number.\n\n• 587 = TLS (recommended, most secure)\n• 465 = SSL (legacy)\n• 25 = No encryption (unsafe)\n\nAlmost all modern providers use 587.'
                },
                {key:'FLOWORK_EMAIL_USER',label:'Email User',type:'text',placeholder:'you@gmail.com',
                    tip:'Sender email address. For Gmail, use your full Gmail address.'
                },
                {key:'FLOWORK_EMAIL_PASS',label:'Email Password',type:'password',placeholder:'App password (NOT your login password!)',sensitive:true,
                    tip:'SMTP password. For Gmail, you MUST use an App Password — not your regular login password.\n\nCreate one at: myaccount.google.com → Security → 2-Step Verification → App Passwords → select "Mail".',
                    warn:'🔒 NEVER use your main email password! Always use an App Password.'
                },
            ]
        },
        {
            id:'tts', label:'🔊 TTS', color:'#f472b6',
            fields:[
                {key:'FLOWORK_TTS_PROVIDER',label:'TTS Provider',type:'select',options:['browser','elevenlabs','google','azure','openai'],
                    tip:'Text-to-Speech provider. Determines AI voice quality.\n\n• Browser = Free, robotic voice (built-in)\n• ElevenLabs = Most natural, premium ($)\n• OpenAI = Good quality, voices: alloy/echo/nova ($)\n• Google/Azure = Enterprise-grade ($)',
                    warn:'Browser TTS is free but robotic. ElevenLabs/OpenAI charge per character.'
                },
                {key:'FLOWORK_TTS_KEY',label:'TTS API Key',type:'password',placeholder:'API key...',sensitive:true,
                    tip:'API Key for your TTS provider.\n\n• ElevenLabs: elevenlabs.io → Profile → API Key\n• OpenAI: platform.openai.com\n\nLeave empty if using browser TTS.'
                },
                {key:'FLOWORK_TTS_VOICE_ID',label:'Voice ID',type:'text',placeholder:'Voice ID or name',
                    tip:'Specific voice to use.\n\n• ElevenLabs: go to elevenlabs.io → Voices → copy Voice ID\n• OpenAI: alloy, echo, fable, onyx, nova, shimmer\n• Google: see Cloud TTS docs for voice names'
                },
            ]
        },
        {
            id:'vision', label:'👁️ Vision & Whisper', color:'#a78bfa',
            fields:[
                {key:'FLOWORK_VISION_PROVIDER',label:'Vision Provider',type:'text',placeholder:'gemini-2.5-flash',
                    tip:'AI model for processing images/screenshots. Used by Browser Automation to "see" web pages.\n\n• Default: gemini-2.5-flash (supports vision, free tier)\n• OpenAI: gpt-4o (paid vision)\n\nModel must support image input.',
                    warn:'Vision powers Browser AI. Wrong model = AI cannot understand screenshots.'
                },
                {key:'FLOWORK_VISION_KEY',label:'Vision API Key',type:'password',placeholder:'Leave empty to use main AI key',sensitive:true,
                    tip:'API Key specifically for vision. If left empty, Flowork automatically uses the main AI Key.\n\nOnly fill this if your vision provider is different from your main AI provider.'
                },
                {key:'FLOWORK_WHISPER_KEY',label:'Whisper API Key',type:'password',placeholder:'Leave empty to use main AI key',sensitive:true,
                    tip:'API Key for OpenAI Whisper (speech-to-text). Converts audio/voice into text.\n\nUsed for voice commands and TikTok Live audio monitoring.\n\nIf empty, uses the main AI Key.'
                },
            ]
        },
        {
            id:'mcp', label:'🔌 MCP Servers', color:'#06b6d4',
            fields:[
                {key:'FLOWORK_MCP_SERVERS',label:'MCP Servers',type:'textarea',placeholder:'filesystem|sse|http://localhost:3000/sse\ngithub|ws|ws://localhost:4000',
                    tip:'Model Context Protocol — connect AI to external tools and services.\n\nFormat per line: name|transport|url\n\n• Transport: "sse" (Server-Sent Events) or "ws" (WebSocket)\n• Example: filesystem|sse|http://localhost:3000/sse\n\nEach connected MCP server adds new tools the AI can use. Servers that are down are skipped automatically.',
                    warn:'Each MCP server expands AI capabilities. Only connect trusted servers.'
                },
            ]
        },
        {
            id:'security', label:'🔒 Security', color:'#ef4444',
            fields:[
                {key:'FLOWORK_REDACTION_ENABLED',label:'Enable Redaction',type:'toggle',
                    tip:'Automatically hides sensitive data (API keys, passwords, tokens) from AI output. When ON, the AI cannot see or display your secrets in chat.',
                    warn:'⚠️ Only disable for debugging. MUST be ON in production to prevent data leaks.'
                },
                {key:'FLOWORK_TOOL_POLICY_ENABLED',label:'Enable Tool Policy',type:'toggle',
                    tip:'Restricts which tools the AI can use based on the active mode (App Builder, Browser AI, etc).\n\nWhen ON: AI only uses relevant tools for current context.\nWhen OFF: AI can use ALL tools regardless of context.',
                    warn:'⚠️ Only disable for debugging. When OFF, AI may run irrelevant/dangerous tools.'
                },
            ]
        },
        {
            id:'session', label:'💾 Session', color:'#84cc16',
            fields:[
                {key:'FLOWORK_SESSION_AUTOSAVE',label:'Auto-Save Sessions',type:'toggle',
                    tip:'Automatically saves your work progress (chat history, context, open files) at regular intervals. If Flowork crashes or closes, you can resume from the last checkpoint.',
                    warn:'When OFF, progress is lost on crash. Recommended: always ON.'
                },
                {key:'FLOWORK_SESSION_INTERVAL',label:'Save Interval (sec)',type:'number',placeholder:'30',
                    tip:'How often sessions are saved, in seconds.\n\n• Default: 30 seconds\n• Lower = safer but slightly heavier on performance\n• Higher = lighter but more risk of losing progress\n\nRecommended: 15-60 seconds.',
                    warn:'Below 10 seconds may impact performance. Above 120 risks losing work.'
                },
            ]
        },
    ];

    function loadSettings() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
        catch(e) { return {}; }
    }

    function saveSettings(config) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); }
        catch(e) {}
    }

    function render() {
        var config = loadSettings();
        var sidebar = document.getElementById('sidebar');
        var content = document.getElementById('content');

        sidebar.innerHTML = GROUPS.map(function(g, i) {
            return '<div class="nav-item' + (i===0?' active':'') + '" data-group="' + g.id + '" style="' + (i===0?'color:'+g.color:'') + '">' +
                '<span>' + g.label.split(' ')[0] + '</span> ' + g.label.replace(/^[^\s]+\s/, '') +
            '</div>';
        }).join('');

        sidebar.querySelectorAll('.nav-item').forEach(function(item) {
            item.addEventListener('click', function() {
                sidebar.querySelectorAll('.nav-item').forEach(function(x){ x.classList.remove('active'); x.style.color=''; });
                item.classList.add('active');
                var gid = item.getAttribute('data-group');
                var g = GROUPS.find(function(x){ return x.id === gid; });
                if (g) item.style.color = g.color;
                var el = document.getElementById('group-' + gid);
                if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
            });
        });

        content.innerHTML = GROUPS.map(function(g) {
            return '<div class="group" id="group-' + g.id + '">' +
                '<div class="group-header" style="color:' + g.color + '">' + g.label + '</div>' +
                '<div class="group-body">' +
                    g.fields.map(function(f) { return renderField(f, config); }).join('') +
                '</div>' +
            '</div>';
        }).join('') +
        '<div class="env-status">' +
            '<div class="env-label">STORAGE STATUS</div>' +
            '<div class="env-value">' + Object.keys(config).length + ' settings stored in localStorage</div>' +
        '</div>';

        content.querySelectorAll('.toggle').forEach(function(el) {
            el.addEventListener('click', function() {
                el.classList.toggle('on');
            });
        });

        // Dynamic AI Model list based on Provider
        var PROVIDER_MODELS = {
            'gemini': ['gemini-2.5-flash', 'gemini-2.5-pro', 'gemini-2.0-flash', 'gemini-2.0-flash-lite'],
            'openai': ['gpt-5.4', 'gpt-5.4-mini', 'gpt-5.4-nano', 'gpt-4o', 'gpt-4o-mini'],
            'anthropic': ['claude-opus-4-20260217', 'claude-sonnet-4-20260217', 'claude-haiku-3-5-20241022'],
            'xai': ['grok-4.20', 'grok-4.1-fast'],
            'deepseek': ['deepseek-chat', 'deepseek-reasoner'],
            'groq': ['groq-llama-3.3-70b-versatile', 'groq-llama-3.1-8b-instant', 'groq-deepseek-r1-distill-llama-70b'],
            'mistral': ['mistral-large-latest', 'mistral-small-latest', 'magistral-medium-latest'],
            'together': ['together-meta-llama/Llama-4-Maverick-17B', 'together-Qwen/Qwen3.5-9B', 'together-deepseek-ai/DeepSeek-V3.1'],
            'fireworks': ['fireworks-accounts/fireworks/models/llama4-maverick-instruct-basic', 'fireworks-accounts/fireworks/models/deepseek-v3'],
            'cohere': ['cohere-command-a-03-2025', 'cohere-command-r-plus-08-2024'],
            'ollama': ['ollama-llama3', 'ollama-deepseek-coder-v2', 'ollama-qwen2.5-coder', 'ollama-custom']
        };
        var providerEl = content.querySelector('[data-key="FLOWORK_AI_PROVIDER"]');
        var selectEl = content.querySelector('[data-key="FLOWORK_AI_MODEL-select"]');
        var inputEl = content.querySelector('.combo-custom[data-key="FLOWORK_AI_MODEL"]');
        if (providerEl && selectEl && inputEl) {
            providerEl.addEventListener('change', function() {
                var p = this.value;
                var models = PROVIDER_MODELS[p] || PROVIDER_MODELS['gemini'];
                
                // Repopulate select
                var currentVal = inputEl.value;
                var isCustom = currentVal && !models.includes(currentVal);
                
                var newHtml = models.map(function(m){ return '<option value="'+m+'" '+(currentVal===m?'selected':'')+'>'+m+'</option>'; }).join('');
                newHtml += '<option value="__custom__" '+(isCustom?'selected':'')+'>[ Custom Input ]</option>';
                selectEl.innerHTML = newHtml;
                
                if (isCustom) {
                    inputEl.style.display = 'block';
                } else if (currentVal === "" || !models.includes(currentVal)) {
                    // Update value to default of new provider if mismatched
                    selectEl.value = models[0];
                    inputEl.value = models[0];
                    inputEl.style.display = 'none';
                } else {
                    inputEl.style.display = 'none';
                    selectEl.value = currentVal;
                }
            });
            // Initial call to filter models based on the initially loaded provider
            providerEl.dispatchEvent(new Event('change'));
        }
    }

    function renderField(f, config) {
        if (f.type === 'divider') return '<div class="divider"></div>';
        var val = config[f.key] || '';
        var html = '<div class="field">';

        // Label + tooltip
        html += '<div class="field-top">';
        html += '<span class="field-label">' + f.label + '</span>';
        if (f.tip) {
            var tipContent = f.tip.replace(/\n/g, '<br>');
            if (f.warn) tipContent += '<span class="tip-warn">⚠️ ' + f.warn + '</span>';
            html += '<span class="tip">?<span class="tip-text">' + tipContent + '</span></span>';
        }
        html += '</div>';

        if (f.type === 'toggle') {
            html += '<div class="toggle-wrap"><div class="toggle' + (val==='true' ? ' on' : '') + '" data-key="' + f.key + '"></div></div>';
        } else if (f.type === 'select') {
            html += '<select class="field-input" data-key="' + f.key + '">';
            (f.options||[]).forEach(function(opt) {
                html += '<option value="' + opt + '"' + (val===opt?' selected':'') + '>' + (opt || '— none —') + '</option>';
            });
            html += '</select>';
        } else if (f.type === 'combo') {
            // User requested a true dropdown that also allows manual input.
            // We use a <select> and a hidden <input> for custom text.
            html += '<div class="combo-wrap" style="display:flex; gap:8px;">';
            html += '<select class="field-input combo-select" data-key="' + f.key + '-select" style="flex:1;">';
            (f.options||[]).forEach(function(opt) {
                var isSelected = (val===opt);
                html += '<option value="' + opt + '"' + (isSelected?' selected':'') + '>' + opt + '</option>';
            });
            var isCustom = val && !(f.options||[]).includes(val);
            html += '<option value="__custom__"' + (isCustom?' selected':'') + '>[ Custom Input ]</option>';
            html += '</select>';
            html += '<input type="text" class="field-input combo-custom" data-key="' + f.key + '" value="' + val + '" placeholder="Type custom model..." style="' + (isCustom ? 'flex:1;' : 'display:none; flex:1;') + '">';
            html += '</div>';
        } else if (f.type === 'textarea') {
            html += '<textarea class="field-input" data-key="' + f.key + '" placeholder="' + (f.placeholder||'') + '">' + val + '</textarea>';
        } else {
            html += '<input class="field-input" type="' + (f.type||'text') + '" data-key="' + f.key + '" value="' + val + '" placeholder="' + (f.placeholder||'') + '">';
        }
        html += '</div>';
        return html;
    }

    function collectAndSave() {
        var config = {};
        document.querySelectorAll('.field-input').forEach(function(el) {
            // Ignore the backing select element for combos if custom is triggered, handled below.
            if(el.classList.contains('combo-select')) return;
            var key = el.getAttribute('data-key');
            if (key) config[key] = el.value || '';
        });
        document.querySelectorAll('.toggle').forEach(function(el) {
            var key = el.getAttribute('data-key');
            if (key) config[key] = el.classList.contains('on') ? 'true' : 'false';
        });
        saveSettings(config);
        showToast('✅ All settings saved!', 'var(--green)');
    }

    function hookComboEvents() {
        document.querySelectorAll('.combo-select').forEach(function(sel) {
            sel.addEventListener('change', function() {
                var customInp = sel.parentElement.querySelector('.combo-custom');
                if (sel.value === '__custom__') {
                    customInp.style.display = 'block';
                    customInp.focus();
                    if(customInp.value === '(select a model)') customInp.value = '';
                } else {
                    customInp.style.display = 'none';
                    customInp.value = sel.value;
                }
            });
        });
    }

    function resetDefaults() {
        if (!confirm('Reset all settings to default? This cannot be undone.\n\nAll API keys, tokens, and configurations will be removed.')) return;
        localStorage.removeItem(STORAGE_KEY);
        render();
        hookComboEvents();
        showToast('🔄 Settings reset to defaults', 'var(--pink)');
    }

    function showToast(msg, color) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = 'rgba(13,17,23,0.95)';
        t.style.color = color || '#fff';
        t.style.border = '1px solid ' + (color || '#fff');
        t.style.display = 'block';
        setTimeout(function(){ t.style.display='none'; }, 2000);
    }

    document.getElementById('btn-save').addEventListener('click', collectAndSave);
    document.getElementById('btn-reset').addEventListener('click', resetDefaults);
    render();
    hookComboEvents();
})();
</script>
</body>
</html>
